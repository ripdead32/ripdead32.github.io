<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rip_Dead Site - Arts</title>
<link rel="icon" href="/favicon.ico">
<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  color:#fff;
  overflow-x:hidden;
  transition:0.3s;
}
/* Gradient background */
body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:linear-gradient(-45deg,#000,#4c1d95,#000,#6d28d9);
  background-size:400% 400%;
  animation:gradientMove 12s ease infinite;
}
@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* Section */
.section{
  padding:40px 20px 80px 20px;
  text-align:center;
}

/* Art cards */
.art-card{
  background:rgba(30,30,30,0.7);
  padding:20px;
  border-radius:16px;
  max-width:500px;
  margin:20px auto;
  text-align:left;
}
.art-card img{
  width:100%;
  border-radius:12px;
  margin-bottom:10px;
}
.art-card h2{
  margin:5px 0;
}
.art-card p{
  margin:3px 0;
}
.button{
  display:inline-block;
  margin:5px 0;
  padding:10px 20px;
  border-radius:8px;
  background:#a855f7;
  color:#000;
  font-weight:bold;
  text-decoration:none;
}
.button:hover{
  background:#c084fc;
}

/* Search bar */
#tagSearch{
  padding:10px;
  border-radius:8px;
  border:none;
  width:200px;
  transition: all 0.4s ease;
  margin-top:20px;
}
#tagSearch:focus{
  transform: translateY(-10px);
  outline:none;
}

/* Loader */
#loader{
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:#111;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding-top:120px;
  gap:25px;
  z-index:9999;
  transition:opacity 0.8s ease;
}
#loader.centered{
  justify-content:center;
}
#loader-logo{
  width:140px;
  transition:transform 0.8s ease, opacity 0.6s ease;
}
.loader-bar{
  width:260px;
  height:8px;
  background:#555;
  border:2px solid #000;
  border-radius:10px;
  overflow:hidden;
}
.loader-fill{
  width:0%;
  height:100%;
  background:white;
  animation:loading 5s forwards;
}
@keyframes loading{
  from{width:0%;}
  to{width:100%;}
}
.bar-hidden{opacity:0;}
.text-show{opacity:1;}
.loader-hide{opacity:0;}
.loader-text{
  font-size:28px;
  color:#fff;
  opacity:0;
  transition:opacity 0.8s ease;
}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <img src="/logo.png" id="loader-logo" alt="Rip_Dead Logo">
  <div class="loader-bar"><div class="loader-fill"></div></div>
  <div class="loader-text" id="loader-text">Rip_Dead Art</div>
</div>

<!-- ART GALLERY -->
<div class="section" id="gallery">

  <!-- First art item -->
  <div class="art-card" data-tags="Funkin">
    <img src="rip-fnf.png" alt="Rip_Dead FNF">
    <h2>Rip_Dead FNF</h2>
    <p><strong>File name:</strong> rip-fnf.png</p>
    <p><strong>File size:</strong> 728 KB</p>
    <p><strong>Publisher:</strong> Rip_Dead</p>
    <p><strong>Tags:</strong> Funkin</p>
    <a href="rip-fnf.png" download class="button">Download</a>
  </div>

</div>

<!-- TAG SEARCH -->
<div style="text-align:center; margin:20px;">
  <input type="text" id="tagSearch" placeholder="Search by tag...">
</div>

<script>
// Loader logic
const loader = document.getElementById("loader");
const bar = document.querySelector(".loader-bar");
const text = document.getElementById("loader-text");

if(!sessionStorage.getItem('artLoaderShown')){
  window.addEventListener("load", () => {
    setTimeout(() => {
      bar.classList.add("bar-hidden");
      loader.classList.add("centered");
      text.classList.add("text-show");

      setTimeout(() => {
        loader.classList.add("loader-hide");
        setTimeout(()=>{loader.style.display="none";},800);
      },1200);
    },5000);
    sessionStorage.setItem('artLoaderShown','true');
  });
} else {
  loader.style.display="none";
}

// Tag search
const searchInput = document.getElementById("tagSearch");
const gallery = document.getElementById("gallery");
searchInput.addEventListener("input", () => {
  const filter = searchInput.value.toLowerCase();
  const cards = gallery.getElementsByClassName("art-card");
  for(let card of cards){
    const tags = card.dataset.tags.toLowerCase();
    card.style.display = tags.includes(filter) ? "" : "none";
  }
});
</script>

</body>
</html>
