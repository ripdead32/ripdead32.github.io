<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rip_Dead Site - Blogs</title>
<link rel="icon" href="/favicon.ico">

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  color:#fff;
  overflow-x:hidden;
  transition:0.3s;
}
body.light{
  color:#111;
}

/* Animated Gradient */
body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:linear-gradient(-45deg,#000,#4c1d95,#000,#6d28d9);
  background-size:400% 400%;
  animation:gradientMove 12s ease infinite;
}
body.light::before{
  background:linear-gradient(-45deg,#fff,#c084fc,#fff,#a855f7);
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* Navbar */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
  z-index:100;
}
.navbar a{
  margin-left:15px;
  color:#fff;
  text-decoration:none;
  font-weight:bold;
}
.navbar a:hover{
  border-bottom:2px solid #a855f7;
}
.nav-right{
  display:flex;
  align-items:center;
}
.theme-toggle{
  margin-left:15px;
  width:35px;
  height:35px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  background:#fff;
  color:#000;
  border:none;
  cursor:pointer;
}
body.light .theme-toggle{
  background:#000;
  color:#fff;
}

/* Hero */
.hero{
  text-align:center;
  padding:80px 20px 40px;
}
.hero h1{
  font-size:32px;
}

/* Cards */
.section{
  padding:40px 20px 80px;
  text-align:center;
}
.card{
  background:rgba(20,20,20,0.6);
  backdrop-filter:blur(12px);
  padding:30px;
  border-radius:16px;
  max-width:700px;
  margin:20px auto;
  transition:transform 0.3s ease;
}
body.light .card{
  background:rgba(255,255,255,0.7);
}
.card:hover{
  transform:translateY(-6px);
}
.card h2{
  margin-bottom:15px;
}
.button{
  display:inline-block;
  padding:14px 30px;
  border-radius:8px;
  background:#a855f7;
  color:#000;
  font-weight:bold;
  text-decoration:none;
  transition:0.2s;
}
.button:hover{
  background:#c084fc;
  transform:scale(1.05);
}

/* Footer */
footer{
  text-align:center;
  padding:20px;
  border-top:1px solid rgba(255,255,255,0.1);
}
body.light footer{
  border-top:1px solid rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="navbar">
  <a href="/">Rip_Dead Site</a>
  <div class="nav-right">
    <a href="/about/">About</a>
    <a href="/support/">Support</a>
    <a href="/downloads/">Download</a>
    <a href="/blogs/">Blogs</a>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeIcon">☀️</button>
  </div>
</div>

<div class="hero">
  <h1>Blogs</h1>
  <p>Latest updates and announcements.</p>
</div>

<div class="section">

  <div class="card">
    <h2>Rip_Dead Site Migrated to RipUI 1.0</h2>
    <a href="/blogs/article1/" class="button">Read Now</a>
  </div>

  <div class="card">
    <h2>Rip_Dead Site Updated To RipUI 1.1</h2>
    <a href="/blogs/article2/" class="button">Read Now</a>
  </div>
  
  <div class="card">
    <h2>Rip_Dead Site Updated To RipUI 1.2</h2>
    <a href="/blogs/article3/" class="button">Read Now</a>
  </div>
  
</div>

<footer>
© 2026 Rip_Dead Studios — All Rights Reserved
</footer>

<script>
const themeIcon=document.getElementById("themeIcon");
function toggleTheme(){
  document.body.classList.toggle("light");
  themeIcon.textContent=document.body.classList.contains("light")?"🌙":"☀️";
}
</script>

</body>
</html>
