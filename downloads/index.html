<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rip_Dead Site - Downloads</title>
<link rel="icon" href="/favicon.ico">
<link rel="stylesheet" href="/navbar.css">

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  color:#fff;
  overflow-x:hidden;
  transition:0.3s;
}
body.light{
  color:#111;
}

/* Animated Gradient Background */
body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:linear-gradient(-45deg,#000,#4c1d95,#000,#6d28d9);
  background-size:400% 400%;
  animation:gradientMove 12s ease infinite;
}
body.light::before{
  background:linear-gradient(-45deg,#fff,#c084fc,#fff,#a855f7);
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* Navbar */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
  z-index:100;
}
.navbar a{
  margin-left:15px;
  color:#fff;
  text-decoration:none;
  font-weight:bold;
}
body.light .navbar a{
  color:#fff; /* keep navbar text white for contrast */
}
.navbar a:hover{
  border-bottom:2px solid #a855f7;
}
.nav-right{
  display:flex;
  align-items:center;
}
.theme-toggle{
  margin-left:15px;
  width:35px;
  height:35px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  background:#fff;
  color:#000;
  border:none;
  cursor:pointer;
}
body.light .theme-toggle{
  background:#000;
  color:#fff;
}

/* Hero */
.hero{
  text-align:center;
  padding:80px 20px 40px 20px;
}
.hero h1{
  font-size:32px;
  margin-bottom:10px;
}

/* Download Cards */
.section{
  padding:40px 20px 80px 20px;
  text-align:center;
}
.card{
  background:rgba(20,20,20,0.6);
  backdrop-filter:blur(12px);
  padding:30px;
  border-radius:16px;
  max-width:700px;
  margin:20px auto;
  transition:transform 0.3s ease;
}
body.light .card{
  background:rgba(255,255,255,0.6);
}
.card:hover{
  transform:translateY(-6px);
}
.card h2{
  font-size:22px;
  margin-bottom:15px;
}
.button{
  display:inline-block;
  margin-top:15px;
  padding:14px 30px;
  border-radius:8px;
  background:#a855f7;
  color:#000;
  font-weight:bold;
  text-decoration:none;
  transition:transform 0.2s ease,background 0.2s ease;
}
.button:hover{
  transform:scale(1.05);
  background:#c084fc;
}

/* Footer */
footer{
  text-align:center;
  padding:20px;
  font-size:14px;
  border-top:1px solid rgba(255,255,255,0.1);
}
body.light footer{
  border-top:1px solid rgba(0,0,0,0.1);
}

/* Responsive */
@media(max-width:768px){
  .navbar{
    flex-direction:column;
    gap:10px;
  }
  .nav-right{
    flex-wrap:wrap;
    justify-content:center;
  }
  .hero h1{
    font-size:26px;
  }
}
</style>
</head>

<body>

<div class="navbar">
  <a href="/">Rip_Dead Site</a>
  <div class="nav-right">
    <a href="/about/">About</a>
    <a href="/support/">Support</a>
    <a href="/downloads/">Download</a>
    <a href="/blogs/">Blogs</a>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeIcon">☀️</button>
  </div>
</div>

<div class="hero">
  <h1>Downloads</h1>
  <p>Official Rip_Dead releases and tools.</p>
</div>

<div class="section">
  <div class="card">
    <h2>RipUI 1.1</h2>
    <p>The latest version of RipUI with improved stability and fixes.</p>
    <a href="#" class="button">Download Now</a>
  </div>

  <div class="card">
    <h2>RipUI 1.0</h2>
    <p>Initial public release of RipUI.</p>
    <a href="#" class="button">Download</a>
  </div>
</div>

<footer>
  © 2026 Rip_Dead Studios — All Rights Reserved
</footer>

<script>
const themeIcon = document.getElementById("themeIcon");
function toggleTheme(){
  document.body.classList.toggle("light");
  themeIcon.textContent = document.body.classList.contains("light") ? "🌙" : "☀️";
}
</script>

</body>
</html>
