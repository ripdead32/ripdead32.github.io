<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link rel="icon" href="/favicon.ico">

<style>
/* ===== Base ===== */
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  color:#fff;
  transition:0.3s;
}
body.light{
  color:#111;
}

/* Ensure ALL text switches in light mode */
body.light h1,
body.light h2,
body.light h3,
body.light p,
body.light span,
body.light li,
body.light a:not(.nav-link){
  color:#111;
}

/* ===== Animated Gradient ===== */
body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:linear-gradient(-45deg,#000,#4c1d95,#000,#6d28d9);
  background-size:400% 400%;
  animation:gradientMove 12s ease infinite;
}
body.light::before{
  background:linear-gradient(-45deg,#ffffff,#c084fc,#ffffff,#a855f7);
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* ===== Dark Blur Navbar ===== */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
  z-index:100;
}
.navbar a{
  margin-left:15px;
  color:#fff;
  text-decoration:none;
  font-weight:bold;
}
.navbar a:hover{
  border-bottom:2px solid #a855f7;
}
.nav-right{
  display:flex;
  align-items:center;
}
.theme-toggle{
  margin-left:15px;
  width:35px;
  height:35px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  background:#fff;
  color:#000;
  border:none;
  cursor:pointer;
}
body.light .theme-toggle{
  background:#000;
  color:#fff;
}

/* ===== Layout ===== */
.hero{
  text-align:center;
  padding:80px 20px 40px;
}
.section{
  padding:40px 20px 100px;
  text-align:center;
}

/* ===== Cards ===== */
.card{
  background:rgba(20,20,20,0.6);
  backdrop-filter:blur(12px);
  padding:40px;
  border-radius:18px;
  max-width:800px;
  margin:30px auto;
}
body.light .card{
  background:rgba(255,255,255,0.8);
}

/* ===== Buttons ===== */
.button{
  display:inline-block;
  margin:10px;
  padding:14px 28px;
  border-radius:10px;
  background:#a855f7;
  color:#000;
  font-weight:bold;
  text-decoration:none;
  transition:0.2s;
}
.button:hover{
  background:#c084fc;
  transform:scale(1.05);
}

/* Footer */
footer{
  text-align:center;
  padding:20px;
  border-top:1px solid rgba(255,255,255,0.1);
}
body.light footer{
  border-top:1px solid rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="navbar">
  <a href="/" class="nav-link">Rip_Dead Site</a>

    <a href="/about/" class="nav-link">About</a>

    <a href="/blogs/" class="nav-link">Blogs</a>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeIcon">☀️</button>
  </div>
</div>

<div class="hero">
  <h1>Downloads</h1>
  <p>Official Rip_Dead Releases</p>
</div>

<div class="section">

  <!-- Kahoot App -->
  <div class="card">
    <h2>Kahoot App</h2>
    <a href="/downloads/kahoot-app" class="button">Main Page</a>
    <a href="/downloads/kahoot-app/releases" class="button">Releases</a>
    <a href="/downloads/kahoot-app/betas" class="button">Betas</a>
  </div>

  <!-- FNF Mods -->
  <div class="card">
    <h2>FNF Mods</h2>
    <a href="/downloads/fnfmods" class="button">FNF Mods</a>
    <a href="/downloads/fnfmods/tutorial-remastered" class="button">Tutorial Remastered</a>
  </div>
  
  <!-- Rip_Dead App -->
  <div class="card">
    <h2>Rip_Dead App</h2>
    <a href="https://files.fm/u/t2dm72a4nw" class="button">Download</a>
  </div>
</div>

<footer>
© 2026 Rip_Dead Studios — All Rights Reserved
</footer>

<script>
const themeIcon=document.getElementById("themeIcon");
function toggleTheme(){
  document.body.classList.toggle("light");
  themeIcon.textContent=document.body.classList.contains("light")?"🌙":"☀️";
}
</script>

</body>
</html>
