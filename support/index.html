<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rip_Dead Site - Support</title>
<link rel="icon" href="/favicon.ico">
<link rel="stylesheet" href="/navbar.css">
</head>
<body>

<div class="navbar">
  <a href="/" class="site-name">Rip_Dead Site</a>
  <div class="nav-right">
    <a href="/about/">About</a>
    <a href="/support/">Support</a>
    <a href="/downloads/" class="download-btn">Download</a>
    <a href="/blogs/">Blogs</a>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeIcon">☀️</button>
  </div>
</div>

<div style="padding:80px 20px; text-align:center;">
  <h1>Support</h1>
</div>

<div class="card">
<form action="https://formkeep.com/f/d13ae91fe8d6" method="POST">
  <input type="text" name="name" placeholder="Name (optional)" style="width:100%;padding:10px;margin:8px 0;border-radius:6px;">
  <input type="email" name="email" placeholder="Email" required style="width:100%;padding:10px;margin:8px 0;border-radius:6px;">
  <input type="text" name="subject" placeholder="Subject" required style="width:100%;padding:10px;margin:8px 0;border-radius:6px;">
  <textarea name="message" placeholder="Message" required style="width:100%;padding:10px;margin:8px 0;border-radius:6px;"></textarea>
  <button class="button" type="submit">Send Message</button>
</form>

<a href="/" class="button">Back to Home</a>
</div>

<footer>
© 2026 Rip_Dead Studios — All Rights Reserved
</footer>

<script>
const themeIcon = document.getElementById("themeIcon");
function toggleTheme(){
  document.body.classList.toggle("light");
  themeIcon.textContent =
    document.body.classList.contains("light") ? "🌙" : "☀️";
}
</script>

</body>
</html>
