<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rip_Dead Site - Support</title>
<link rel="icon" href="/favicon.ico">
<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  color:#fff;
  overflow-x:hidden;
  background: linear-gradient(-45deg,#000,#4c1d95,#000,#6d28d9);
  background-size:400% 400%;
  animation:gradientMove 12s ease infinite;
}
body.light {
  background: linear-gradient(-45deg,#fff,#c084fc,#fff,#a855f7);
}
@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(12px);
  position:sticky;
  top:0;
  z-index:100;
}
body.light .navbar{background:rgba(255,255,255,0.3);}
.navbar a, .navbar button{
  margin-left:15px;
  color:#fff;
  text-decoration:none;
  font-weight:bold;
  border:none;
  cursor:pointer;
}
.navbar a:hover{border-bottom:2px solid #a855f7;}
.theme-toggle{
  width:35px;
  height:35px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  background:#fff;
  color:#000;
}
body.light .theme-toggle{background:#000;color:#fff;}
.nav-right{display:flex;align-items:center;}
@media(max-width:768px){
  .navbar{flex-direction:column;gap:10px;}
  .nav-right{flex-wrap:wrap;justify-content:center;}
}

.container{
  max-width:700px;
  margin:80px auto 40px auto;
  padding:30px;
  background:rgba(20,20,20,0.6);
  backdrop-filter:blur(12px);
  border-radius:16px;
  text-align:center;
}

h1{font-size:36px;margin-bottom:20px;}
p{line-height:1.6em;margin-bottom:20px;}

form{
  display:flex;
  flex-direction:column;
  gap:15px;
}
input, textarea{
  padding:12px;
  border-radius:8px;
  border:2px solid #a855f7;
  background:rgba(0,0,0,0.4);
  color:#fff;
  font-size:16px;
  resize:none;
}
input::placeholder, textarea::placeholder{color:rgba(255,255,255,0.7);}
button{
  padding:14px;
  border:none;
  border-radius:8px;
  background:#a855f7;
  color:#000;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}
button:hover{transform:scale(1.05);background:#c084fc;}

footer{text-align:center;padding:20px;font-size:14px;border-top:1px solid rgba(255,255,255,0.1);}
</style>
</head>
<body>

<div class="navbar">
  <a href="/" class="site-name">Rip_Dead Site</a>
  <div class="nav-right">
    <a href="/about/">About</a>
    <a href="/support/">Support</a>
    <a href="/downloads/">Download</a>
    <a href="/blogs/">Blogs</a>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeIcon">☀️</button>
  </div>
</div>

<div class="container">
  <h1>Want help? We got your back!</h1>
  <p>Fill out this form and your message will be sent to Rip_Dead directly!</p>

  <form action="https://formkeep.com/f/d13ae91fe8d6" method="POST">
    <input type="text" name="name" placeholder="Name (don't use your real name, optional)">
    <input type="email" name="email" placeholder="Email (optional)">
    <textarea name="message" placeholder="Your message" rows="6" required></textarea>
    <button type="submit">Send Message</button>
  </form>

  <a href="/" class="button" style="margin-top:20px;display:inline-block;">Back to Home</a>
</div>

<footer>© 2026 Rip_Dead Studios — All Rights Reserved</footer>

<script>
const themeIcon=document.getElementById("themeIcon");
function toggleTheme(){
  document.body.classList.toggle("light");
  themeIcon.textContent=document.body.classList.contains("light")?"🌙":"☀️";
}
</script>

</body>
</html>
