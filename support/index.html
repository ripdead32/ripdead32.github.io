<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rip_Dead Site - Support</title>
<link rel="icon" href="/favicon.ico">
<link rel="stylesheet" href="/navbar.css">
<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  color:#fff;
  overflow-x:hidden;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:linear-gradient(-45deg,#000,#4c1d95,#000,#6d28d9);
  background-size:400% 400%;
  animation:gradientMove 12s ease infinite;
}
body.light::before{
  background:linear-gradient(-45deg,#fff,#c084fc,#fff,#a855f7);
}
@keyframes gradientMove{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}

.hero{text-align:center;padding:100px 20px 40px 20px;}
.hero h1{font-size:36px;}
.hero p{font-size:18px;margin-top:10px;}

.container{padding:20px;max-width:700px;margin:0 auto;text-align:center;}
textarea,input{width:90%;padding:12px;margin:10px 0;border-radius:8px;border:2px solid #a855f7;background:rgba(255,255,255,0.05);color:#fff;font-family:inherit;}
textarea:focus,input:focus{outline:none;border-color:#c084fc;}
button.submit{padding:14px 30px;border-radius:8px;background:#a855f7;color:#000;font-weight:bold;border:none;cursor:pointer;transition:0.2s;}
button.submit:hover{transform:scale(1.05);background:#c084fc;}

footer{text-align:center;padding:20px;font-size:14px;border-top:1px solid rgba(255,255,255,0.1);}
@media(max-width:768px){
  .hero h1{font-size:28px;}
  .hero p{font-size:16px;}
}
</style>
</head>
<body>

<div class="navbar">
  <a href="/" class="site-name">Rip_Dead Site</a>
  <div class="nav-right">
    <a href="/about/">About</a>
    <a href="/support/">Support</a>
    <a href="/downloads/">Download</a>
    <a href="/blogs/">Blogs</a>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeIcon">☀️</button>
  </div>
</div>

<div class="hero">
  <h1>Support Page</h1>
  <p>Have a question or problem? Fill the form below!</p>
</div>

<div class="container">
  <form action="https://formkeep.com/f/d13ae91fe8d6" method="POST">
    <input type="text" name="name" placeholder="Name (don't use your real name, optional)">
    <input type="email" name="email" placeholder="Email" required>
    <textarea name="message" placeholder="Message" rows="6" required></textarea>
    <button type="submit" class="submit">Send Message</button>
  </form>
  <br>
  <a href="/" class="button">Back to Home</a>
</div>

<footer>© 2026 Rip_Dead Studios — All Rights Reserved</footer>

<script>
const themeIcon=document.getElementById("themeIcon");
function toggleTheme(){
  document.body.classList.toggle("light");
  themeIcon.textContent=document.body.classList.contains("light")?"🌙":"☀️";
}
</script>

</body>
</html>
