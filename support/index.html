<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rip_Dead Site - Support</title>
<link rel="icon" href="/favicon.ico">
<link rel="stylesheet" href="/navbar.css">
<style>
body{margin:0;font-family:'Segoe UI',sans-serif;color:#fff;overflow-x:hidden;animation:fadeIn 0.6s ease forwards;}
body::before{content:"";position:fixed;inset:0;z-index:-1;background:linear-gradient(-45deg,#000,#4c1d95,#000,#6d28d9);background-size:400% 400%;animation:gradientMove 12s ease infinite;}
body.light::before{background:linear-gradient(-45deg,#fff,#c084fc,#fff,#a855f7);background-size:400% 400%;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes gradientMove{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
.hero{text-align:center;padding:80px 20px 40px 20px;}
.hero h1{font-size:36px;}
.section{padding:40px 20px 80px 20px;text-align:center;}
.card{background:rgba(20,20,20,0.6);backdrop-filter:blur(12px);padding:30px;border-radius:16px;max-width:600px;margin:20px auto;transition:transform 0.3s ease;text-align:left;}
.card:hover{transform:translateY(-6px);}
form input,form textarea{width:100%;padding:10px;margin:8px 0;border-radius:8px;border:1px solid #a855f7;background:rgba(0,0,0,0.2);color:#fff;}
body.light form input,body.light form textarea{background:rgba(255,255,255,0.4);color:#111;}
form textarea{resize:vertical;min-height:100px;}
form button{padding:10px 25px;border-radius:8px;background:#a855f7;color:#000;font-weight:bold;border:none;cursor:pointer;transition:transform 0.2s ease,background 0.2s ease;}
form button:hover{transform:scale(1.05);background:#c084fc;}
.button{display:inline-block;margin-top:15px;padding:10px 25px;border-radius:8px;background:#a855f7;color:#000;font-weight:bold;text-decoration:none;transition:transform 0.2s ease,background 0.2s ease;}
.button:hover{transform:scale(1.05);background:#c084fc;}
footer{text-align:center;padding:20px;border-top:1px solid rgba(255,255,255,0.1);font-size:14px;}
@media(max-width:768px){.navbar{flex-direction:column;gap:10px;}.nav-right{flex-wrap:wrap;justify-content:center;}.hero h1{font-size:28px;}.card{padding:20px;}}
</style>
</head>
<body>

<div class="navbar">
  <a href="/" class="site-name">Rip_Dead Site</a>
  <div class="nav-right">
    <a href="/about/">About</a>
    <a href="/support/">Support</a>
    <a href="/downloads/" class="download-btn">Download</a>
    <a href="/blogs/">Blogs</a>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeIcon">☀️</button>
  </div>
</div>

<div class="hero">
  <h1>Support</h1>
</div>

<div class="section">
  <div class="card">
    <h2>Want help? We got your back!</h2>
    <form id="supportForm" action="https://formkeep.com/f/d13ae91fe8d6" method="POST">
      <input type="text" name="name" placeholder="Name (don't use your real name, optional)">
      <input type="email" name="email" placeholder="Email" required>
      <input type="text" name="subject" placeholder="Subject" required>
      <textarea name="message" placeholder="Message" required></textarea>
      <button type="submit">Send Message</button>
    </form>
    <div style="text-align:center;">
      <a href="/" class="button">Back to Home</a>
    </div>
  </div>
</div>

<footer>© 2026 Rip_Dead Studios — All Rights Reserved</footer>

<script>
const themeIcon=document.getElementById("themeIcon");
function toggleTheme(){document.body.classList.toggle("light");themeIcon.textContent=document.body.classList.contains("light")?"🌙":"☀️";}

// AJAX Form Submission
const form=document.getElementById("supportForm");
form.addEventListener("submit",async(e)=>{e.preventDefault();const formData=new FormData(form);try{const response=await fetch(form.action,{method:"POST",body:formData,headers:{'Accept':'application/json'}});if(response.ok){alert("Submitted Successfully!");form.reset();}else{alert("Failed to send message.");}}catch(err){alert("Failed to send message.");}});
</script>

</body>
</html>
