<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rip_Dead Site - Support</title>
<link rel="icon" href="/favicon.ico" type="image/x-icon">

<style>
:root {
  --text: #ffffff;
  --card: rgba(20,20,20,0.6);
  --accent: #a855f7;
}

body.light {
  --text: #111;
  --card: rgba(255,255,255,0.7);
  --accent: #9333ea;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: var(--text);
  overflow-x: hidden;
  animation: fadeIn 0.6s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;
  background: linear-gradient(-45deg, #000000, #4c1d95, #000000, #6d28d9);
  background-size: 400% 400%;
  animation: gradientMove 12s ease infinite;
}

body.light::before {
  background: linear-gradient(-45deg, #ffffff, #c084fc, #ffffff, #a855f7);
  background-size: 400% 400%;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Navbar */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  backdrop-filter: blur(10px);
}

.site-name {
  font-weight: bold;
  font-size: 20px;
  text-decoration: none;
  color: var(--text);
  position: relative;
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 15px;
}

.nav-right a {
  text-decoration: none;
  color: var(--text);
  position: relative;
}

.nav-right a::after,
.site-name::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -4px;
  width: 0%;
  height: 2px;
  background: var(--accent);
  transition: 0.3s;
}

.nav-right a:hover::after,
.site-name:hover::after {
  width: 100%;
}

.download-btn {
  padding: 6px 14px;
  border-radius: 8px;
  background: var(--accent);
  color: #000;
  font-weight: bold;
  text-decoration: none;
}

.theme-toggle {
  font-size: 20px;
  border: none;
  cursor: pointer;
  border-radius: 50%;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.3s ease, background 0.3s ease;
  background: #ffffff;
}

body.light .theme-toggle {
  background: #000000;
}

.theme-toggle:hover {
  transform: scale(1.1);
}

/* Hero */
.hero {
  text-align: center;
  padding: 80px 20px 40px 20px;
}

.hero h1 {
  font-size: 36px;
}

/* Cards */
.section {
  padding: 40px 20px 80px 20px;
  text-align: center;
}

.card {
  background: var(--card);
  backdrop-filter: blur(12px);
  padding: 30px;
  border-radius: 16px;
  max-width: 600px;
  margin: 20px auto;
  transition: transform 0.3s ease;
  text-align: left;
}

.card:hover {
  transform: translateY(-6px);
}

.card h2 {
  margin-top: 0;
  text-align: center;
}

/* Form */
form input, form textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid var(--accent);
  background: rgba(0,0,0,0.2);
  color: var(--text);
}

body.light form input, body.light form textarea {
  background: rgba(255,255,255,0.4);
  color: var(--text);
}

form textarea {
  resize: vertical;
  min-height: 100px;
}

form button {
  padding: 10px 25px;
  border-radius: 8px;
  background: var(--accent);
  color: #000;
  font-weight: bold;
  border: none;
  cursor: pointer;
  transition: transform 0.2s ease, background 0.2s ease;
}

form button:hover {
  transform: scale(1.05);
  background: #c084fc;
}

/* Back to Home Button */
.button {
  display: inline-block;
  margin-top: 15px;
  padding: 10px 25px;
  border-radius: 8px;
  background: var(--accent);
  color: #000;
  font-weight: bold;
  text-decoration: none;
  transition: transform 0.2s ease, background 0.2s ease;
}

.button:hover {
  transform: scale(1.05);
  background: #c084fc;
}

/* Footer */
footer {
  text-align: center;
  padding: 20px;
  border-top: 1px solid rgba(255,255,255,0.1);
  font-size: 14px;
}

@media (max-width: 768px) {
  .navbar {
    flex-direction: column;
    gap: 10px;
  }
  .nav-right {
    flex-wrap: wrap;
    justify-content: center;
  }
  .hero h1 {
    font-size: 28px;
  }
  .card {
    padding: 20px;
  }
}
</style>
</head>
<body>

<div class="navbar">
  <a href="/" class="site-name">Rip_Dead Site</a>

  <div class="nav-right">
    <a href="/about/">About</a>
    <a href="/support/">Support</a>
    <a href="/downloads/" class="download-btn">Download</a>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeIcon">☀️</button>
  </div>
</div>

<div class="hero">
  <h1>Support</h1>
</div>

<div class="section">
  <div class="card">
    <h2>Want help? We got your back!</h2>
    <form id="supportForm" action="https://formkeep.com/f/d13ae91fe8d6" method="POST">
      <input type="text" name="name" placeholder="Name (don't use your real name, optional)">
      <input type="email" name="email" placeholder="Email" required>
      <input type="text" name="subject" placeholder="Subject" required>
      <textarea name="message" placeholder="Message" required></textarea>
      <button type="submit">Send Message</button>
    </form>
    <div style="text-align:center;">
      <a href="/" class="button">Back to Home</a>
    </div>
  </div>
</div>

<footer>
  © 2026 Rip_Dead Studios — All Rights Reserved
</footer>

<script>
const themeIcon = document.getElementById("themeIcon");
function toggleTheme() {
  document.body.classList.toggle("light");
  const isLight = document.body.classList.contains("light");
  themeIcon.textContent = isLight ? "🌙" : "☀️";
}

// AJAX Form Submission
const form = document.getElementById("supportForm");
form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const formData = new FormData(form);

  try {
    const response = await fetch(form.action, {
      method: "POST",
      body: formData,
      headers: { 'Accept': 'application/json' }
    });

    if (response.ok) {
      alert("Submitted Successfully!");
      form.reset();
    } else {
      alert("Failed to send message.");
    }
  } catch (err) {
    alert("Failed to send message.");
  }
});
</script>

</body>
</html>
