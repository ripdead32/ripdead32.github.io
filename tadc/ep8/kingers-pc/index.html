<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rip_Dead Site -Kinger's PC Simulation</title>
<link rel="icon" type="image/x-icon" href="pc.ico">
<style>
/* ── C&A CORPORATE PROTOCOL ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root {
    --bg-gray: #c0c0c0;
    --win-blue: #000080;
    --win-blue-light: #1084d0;
    --border-bright: #ffffff;
    --border-dark: #808080;
    --border-black: #000000;
    --monitor-yellow: #e8dfb8;
}

body { width: 100vw; height: 100vh; background: #000; display: flex; align-items: center; justify-content: center; font-family: 'Tahoma', sans-serif; overflow: hidden; }

/* ── THE YELLOW MONITOR ── */
.monitor-housing {
    width: 90vw; max-width: 900px; padding: 35px 35px 55px;
    background: var(--monitor-yellow);
    border-radius: 30px;
    box-shadow: 0 40px 100px rgba(0,0,0,0.9), inset 2px 2px 10px #fff;
    position: relative;
    border: 4px solid #c4b58d;
}

.bezel { background: #1a1a1a; padding: 12px; border-radius: 10px; box-shadow: inset 0 0 30px #000; }
.crt-screen { width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 4px; position: relative; overflow: hidden; display: flex; flex-direction: column; }
.crt-screen::after { content: ""; position: absolute; inset: 0; background: repeating-linear-gradient(rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 1px, transparent 2px); pointer-events: none; z-index: 1000; }

/* ── SCREEN STATES ── */
#boot-content, #desktop, #shutdown-screen { position: absolute; inset: 0; display: none; flex-direction: column; }
#boot-content { background: #e1eef4; align-items: center; justify-content: center; z-index: 10; }
#desktop { background: #008080; z-index: 5; }
#shutdown-screen { background: #000; color: #df9000; align-items: center; justify-content: center; text-align: center; font-family: 'Courier New', monospace; font-size: 22px; padding: 40px; z-index: 15; }

/* Retro Logo */
.retro-logo { font-family: 'Arial Black', sans-serif; font-size: 60px; color: #000; letter-spacing: -4px; }
.retro-logo span { color: #d00; }

/* ── WINDOWS & UI ── */
.window { position: absolute; background: var(--bg-gray); border: 2px solid; border-color: var(--border-bright) var(--border-dark) var(--border-dark) var(--border-bright); display: none; z-index: 100; box-shadow: 1px 1px 0 #000; }
.title-bar { background: linear-gradient(90deg, var(--win-blue), var(--win-blue-light)); color: white; padding: 3px 6px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; cursor: move; font-size: 11px; }
.close-btn { width: 16px; height: 14px; background: var(--bg-gray); border: 1px solid #000; color: black; font-size: 9px; text-align: center; cursor: pointer; line-height: 12px; }

/* Terminal Styling */
.terminal-body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 15px; height: calc(100% - 25px); overflow-y: auto; font-size: 13px; line-height: 1.4; }
.cursor { display: inline-block; width: 8px; height: 15px; background: #0f0; animation: blink 1s infinite; vertical-align: middle; }
@keyframes blink { 50% { opacity: 0; } }

.icon { width: 75px; padding: 8px; color: white; cursor: pointer; text-align: center; margin: 15px; }
.icon-text { text-shadow: 1px 1px #000; font-size: 10px; }

#taskbar { margin-top: auto; height: 30px; background: var(--bg-gray); border-top: 2px solid var(--border-bright); display: flex; align-items: center; padding: 2px 4px; z-index: 200; }
#start-btn { font-weight: bold; height: 24px; padding: 0 10px; border: 2px solid; border-color: var(--border-bright) var(--border-dark) var(--border-dark) var(--border-bright); background: var(--bg-gray); cursor: pointer; }

/* ── HARDWARE ── */
.power-led { position: absolute; bottom: 22px; right: 90px; width: 8px; height: 8px; background: #200; border-radius: 50%; }
.power-led.on { background: #0f0; box-shadow: 0 0 10px #0f0; }
.pwr-btn { position: absolute; bottom: 15px; right: 45px; width: 25px; height: 25px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #999, #333); border: 2px solid #222; cursor: pointer; }
</style>
</head>
<body>

<div class="monitor-housing">
    <div class="bezel">
        <div class="crt-screen" id="main-screen">
            
            <div id="boot-content">
                <div class="retro-logo">C<span>&</span>A</div>
                <div id="boot-status"></div>
            </div>

            <div id="desktop">
                <div class="icon" ondblclick="toggleWin('files-win')">
                    <div style="font-size:30px">📂</div>
                    <div class="icon-text">Admin Files</div>
                </div>

                <div id="files-win" class="window" style="top:20px; left:20px; width:320px; height:220px;">
                    <div class="title-bar">
                        <span>C:\C&A\SYSTEM</span>
                        <div class="close-btn" onclick="toggleWin('files-win')">✕</div>
                    </div>
                    <div style="padding:15px; background:white; height:calc(100% - 21px); border:2px inset; display:flex; gap:25px;">
                        <div style="text-align:center; cursor:pointer;" ondblclick="toggleWin('terminal-win')">
                            <div style="font-size:32px">🎩</div>
                            <p style="font-size:10px; font-weight:bold;">CAINE</p>
                        </div>
                        <div style="text-align:center; cursor:pointer;" onclick="alert('ERROR: AI.obj is corrupted by abstraction.')">
                            <div style="font-size:32px">🌀</div>
                            <p style="font-size:10px; font-weight:bold;">AI</p>
                        </div>
                    </div>
                </div>

                <div id="terminal-win" class="window" style="top:40px; left:60px; width:450px; height:300px;">
                    <div class="title-bar">
                        <span>C&A Command Prompt - CAINE_MEMORY_BLOCK</span>
                        <div class="close-btn" onclick="toggleWin('terminal-win')">✕</div>
                    </div>
                    <div class="terminal-body" id="term-body">
                        <div id="term-output"></div>
                        <span id="term-typing"></span><span class="cursor"></span>
                    </div>
                </div>

                <div id="taskbar">
                    <button id="start-btn" onclick="alert('System busy: CAINE process active.')">Start</button>
                    <div id="clock" style="margin-left:auto; border:1px inset; padding:0 10px; font-size:11px;">12:00 PM</div>
                </div>
            </div>

            <div id="shutdown-screen">
                <p>It is now safe to turn off your computer.</p>
            </div>

        </div>
    </div>
    
    <div class="power-led" id="led"></div>
    <div class="pwr-btn" onclick="togglePhysicalPower()"></div>
</div>

<script>
let pcStatus = "OFF";

function togglePhysicalPower() {
    const led = document.getElementById('led');
    if (pcStatus === "OFF") {
        pcStatus = "BOOTING";
        led.classList.add('on');
        document.getElementById('boot-content').style.display = 'flex';
        runBoot();
    } else {
        location.reload();
    }
}

function runBoot() {
    const status = document.getElementById('boot-status');
    const stages = ["BIOS INIT...", "MEM CHK...", "C&A READY."];
    let i = 0;
    const t = setInterval(() => {
        status.innerText = stages[i++];
        if (i > stages.length) {
            clearInterval(t);
            document.getElementById('boot-content').style.display = 'none';
            document.getElementById('desktop').style.display = 'flex';
            pcStatus = "ON";
            startClock();
            startTerminalSequence();
        }
    }, 800);
}

// ── NEW TERMINAL SEQUENCE ──
async function startTerminalSequence() {
    const output = document.getElementById('term-output');
    const typing = document.getElementById('term-typing');
    
    const lines = [
        "(C) 1996, DIGITAL CIRCUS MAINFRAME, CAINE MEMORY BLOCK",
        "",
        "login: "
    ];

    for(let line of lines) {
        output.innerHTML += line + "<br>";
        await new Promise(r => setTimeout(r, 400));
    }

    await typeEffect(typing, "kinger", 200);
    output.innerHTML += "kinger<br>password: ";
    typing.innerHTML = "";
    
    await typeEffect(typing, "queenie123", 150);
    output.innerHTML += "**********<br><br>";
    typing.innerHTML = "";

    await new Promise(r => setTimeout(r, 600));
    output.innerHTML += "<span style='color:cyan;'>message-from-RD@Site:</span> did you really think im coding an entire terminal? nah jokes on you i'd roll<br><br>";
    output.innerHTML += "C:\\> ";
}

function typeEffect(element, text, speed) {
    return new Promise(resolve => {
        let i = 0;
        const t = setInterval(() => {
            element.innerHTML += text[i++];
            if (i >= text.length) {
                clearInterval(t);
                setTimeout(resolve, 500);
            }
        }, speed);
    });
}

function toggleWin(id) {
    const w = document.getElementById(id);
    w.style.display = (w.style.display === 'block') ? 'none' : 'block';
}

function startClock() {
    const clock = document.getElementById('clock');
    setInterval(() => {
        const now = new Date();
        clock.innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }, 1000);
}

// Drag logic
document.querySelectorAll('.title-bar').forEach(header => {
    header.onmousedown = function(e) {
        let win = header.parentElement;
        let shiftX = e.clientX - win.getBoundingClientRect().left;
        let shiftY = e.clientY - win.getBoundingClientRect().top;
        function moveAt(px, py) {
            win.style.left = px - shiftX - document.getElementById('main-screen').getBoundingClientRect().left + 'px';
            win.style.top = py - shiftY - document.getElementById('main-screen').getBoundingClientRect().top + 'px';
        }
        function onMove(e) { moveAt(e.clientX, e.clientY); }
        document.addEventListener('mousemove', onMove);
        document.onmouseup = () => document.removeEventListener('mousemove', onMove);
    };
});
</script>
</body>
</html>
