<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rip_Dead Site -Kinger's PC Simulation</title>
<link rel="icon" type="image/x-icon" href="pc.ico">
<style>
/* ── C&A CORPORATE STYLE ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root {
    --bg-gray: #c0c0c0;
    --win-blue: #000080;
    --win-blue-light: #1084d0;
    --border-bright: #ffffff;
    --border-dark: #808080;
    --border-black: #000000;
}

html, body { 
    width: 100%; height: 100%; 
    background: #000; 
    font-family: 'Tahoma', 'MS Sans Serif', Arial, sans-serif; 
    font-size: 11px; 
    overflow: hidden; 
}

/* ── C&A MONITOR BOOT ── */
#boot-screen {
    position: fixed; inset: 0; 
    display: flex; align-items: center; justify-content: center; 
    background: #000; z-index: 9999; 
    transition: opacity 1.2s ease-in-out;
}
.monitor {
    width: 620px; padding: 45px;
    background: linear-gradient(160deg, #5a5a8a, #3a3a6a);
    border-radius: 25px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.9), inset 0 2px 10px rgba(255,255,255,0.1);
    position: relative;
}
.screen-bezel {
    background: #1a1a1a; padding: 12px; border-radius: 8px;
    box-shadow: inset 0 0 20px #000;
}
.screen-glass {
    width: 100%; aspect-ratio: 4/3;
    background: #e1eef4; border-radius: 4px;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
}

/* The CnA.png Logo Styling */
#ca-logo {
    max-width: 180px; 
    max-height: 120px;
    height: auto;
    margin-bottom: 20px;
    display: none; /* Appears during hardware check */
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
}

.monitor-btn {
    width: 20px; height: 20px; position: absolute; bottom: 15px; right: 60px;
    background: radial-gradient(circle at 35% 35%, #777, #222);
    border: 2px solid #444; border-radius: 50%;
    cursor: pointer;
}
.monitor-btn.active {
    background: radial-gradient(circle at 35% 35%, #5dfc60, #1a8a1e);
    box-shadow: 0 0 12px rgba(93, 252, 96, 0.5);
}

#boot-status {
    color: #333; font-family: 'Courier New', monospace; font-weight: bold;
    text-align: center; height: 20px; font-size: 12px;
}

/* ── DESKTOP & UI ── */
#desktop { width: 100vw; height: 100vh; background: #008080; display: none; }
.icon { width: 85px; padding: 10px; display: flex; flex-direction: column; align-items: center; color: white; cursor: pointer; position: absolute; }
.icon-text { text-shadow: 1px 1px black; text-align: center; padding-top: 4px; }

.window { position: absolute; background: var(--bg-gray); border: 2px solid; border-color: var(--border-bright) var(--border-dark) var(--border-dark) var(--border-bright); box-shadow: 1px 1px 0 var(--border-black); display: none; z-index: 10; }
.title-bar { background: linear-gradient(90deg, var(--win-blue), var(--win-blue-light)); color: white; padding: 3px 5px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; cursor: move; }
.window-body { padding: 8px; height: calc(100% - 25px); }

#taskbar { position: fixed; bottom: 0; width: 100%; height: 28px; background: var(--bg-gray); border-top: 2px solid var(--border-bright); display: flex; align-items: center; padding: 2px; z-index: 1000; }
#start-btn { font-weight: bold; height: 22px; padding: 0 8px; border: 2px solid; border-color: var(--border-bright) var(--border-dark) var(--border-dark) var(--border-bright); background: var(--bg-gray); cursor: pointer; }
#clock { margin-left: auto; border: 1px inset; padding: 2px 8px; background: var(--bg-gray); }
</style>
</head>
<body>

<div id="boot-screen">
    <div class="monitor">
        <div class="screen-bezel">
            <div class="screen-glass">
                <img id="ca-logo" src="CnA.png" alt="C&A Logo">
                <div id="boot-status"></div>
            </div>
        </div>
        <div class="monitor-btn" id="pwr-btn" onclick="triggerBoot()"></div>
        <p style="color: rgba(255,255,255,0.2); position: absolute; bottom: 15px; left: 45px; font-size: 10px;">C&A DEVELOPMENT & AESTHETICS &copy; 1995</p>
    </div>
</div>

<div id="desktop">
    <div class="icon" style="top: 10px; left: 10px;" ondblclick="toggleWin('explorer')">
        <div style="font-size:32px">📂</div>
        <div class="icon-text">My Computer</div>
    </div>

    <div id="explorer" class="window" style="top:60px; left:140px; width:450px; height:300px;">
        <div class="title-bar">
            <span>C:\CANDA\System32\Agents</span>
            <div onclick="toggleWin('explorer')" style="cursor:pointer; background:#c0c0c0; color:black; padding:0 4px; border:1px solid #000;">✕</div>
        </div>
        <div class="window-body">
            <div style="background:white; border: 2px inset; height: 100%; padding: 12px;">
                <p>Proprietary Agent Management Interface</p>
                <hr style="margin:10px 0">
                <div style="text-align: center; width: 80px;">
                    <div style="font-size:48px;">🎩</div>
                    <p style="font-weight:bold">CAINE.EXE</p>
                </div>
            </div>
        </div>
    </div>

    <div id="taskbar">
        <button id="start-btn">Start</button>
        <div id="clock">12:00 PM</div>
    </div>
</div>

<script>
function triggerBoot() {
    const btn = document.getElementById('pwr-btn');
    if(btn.classList.contains('active')) return;
    btn.classList.add('active');
    
    const status = document.getElementById('boot-status');
    const logo = document.getElementById('ca-logo');
    const stages = ["INITIALIZING...", "DETECTING C&A HARDWARE...", "LOADING KERNEL...", "READY."];
    
    let i = 0;
    const interval = setInterval(() => {
        status.innerText = stages[i];
        if(i === 1) logo.style.display = 'block'; 
        i++;
        if(i >= stages.length) {
            clearInterval(interval);
            setTimeout(() => {
                document.getElementById('boot-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('boot-screen').style.display = 'none';
                    document.getElementById('desktop').style.display = 'block';
                    setInterval(updateClock, 1000);
                    updateClock();
                }, 1200);
            }, 800);
        }
    }, 800);
}

function toggleWin(id) {
    const win = document.getElementById(id);
    win.style.display = (win.style.display === 'block') ? 'none' : 'block';
}

function updateClock() {
    const now = new Date();
    document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
}

// Drag functionality
document.querySelectorAll('.title-bar').forEach(header => {
    header.onmousedown = function(e) {
        let win = header.parentElement;
        let shiftX = e.clientX - win.getBoundingClientRect().left;
        let shiftY = e.clientY - win.getBoundingClientRect().top;
        function moveAt(px, py) { win.style.left = px - shiftX + 'px'; win.style.top = py - shiftY + 'px'; }
        function onMouseMove(e) { moveAt(e.clientX, e.clientY); }
        document.addEventListener('mousemove', onMouseMove);
        document.onmouseup = () => { document.removeEventListener('mousemove', onMouseMove); };
    };
});
</script>
</body>
</html>
