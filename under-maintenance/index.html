<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rip_Dead Site - Under Maintenance</title>
<link rel="icon" href="/favicon.ico">
<link rel="stylesheet" href="/navbar.css">

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  color:#fff;
  overflow-x:hidden;
  transition:0.3s;
}

/* FIX: Light mode text color */
body.light{
  color:#111;
}

/* Animated Gradient */
body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:linear-gradient(-45deg,#000,#4c1d95,#000,#6d28d9);
  background-size:400% 400%;
  animation:gradientMove 12s ease infinite;
}
body.light::before{
  background:linear-gradient(-45deg,#fff,#c084fc,#fff,#a855f7);
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* Navbar */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
  z-index:100;
}
.navbar a, .navbar button{
  margin-left:15px;
  color:inherit;
  text-decoration:none;
  font-weight:bold;
  background:none;
  border:none;
  cursor:pointer;
}
.navbar a:hover{
  border-bottom:2px solid #a855f7;
}

.theme-toggle{
  width:35px;
  height:35px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  background:#fff;
  color:#000;
  transition:0.2s ease;
}
body.light .theme-toggle{
  background:#000;
  color:#fff;
}

.nav-right{
  display:flex;
  align-items:center;
}

/* Hero */
.hero{
  text-align:center;
  padding:120px 20px 60px 20px;
}

.hero h1{
  font-size:70px;
  margin-bottom:20px;
  text-shadow:0 0 20px rgba(168,85,247,0.6);
}

.hero p{
  font-size:20px;
  margin-bottom:30px;
}

/* Button */
a.button{
  display:inline-block;
  padding:16px 36px;
  border-radius:8px;
  background:#a855f7;
  color:#000;
  font-weight:bold;
  text-decoration:none;
  transition:transform 0.2s ease,background 0.2s ease;
}
a.button:hover{
  transform:scale(1.07);
  background:#c084fc;
}

footer{
  text-align:center;
  padding:20px;
  font-size:14px;
  border-top:1px solid rgba(255,255,255,0.1);
}

@media(max-width:768px){
  .navbar{
    flex-direction:column;
    gap:10px;
  }
  .nav-right{
    flex-wrap:wrap;
    justify-content:center;
  }
  .hero h1{
    font-size:48px;
  }
  .hero p{
    font-size:16px;
  }
}
</style>
</head>

<body>

<div class="navbar">
  <a href="/" class="site-name">Rip_Dead Site - Under Maintenance</a>
  <div class="nav-right">
    <a href="/about/">About</a>
    <a href="/support/">Support</a>
    <a href="/downloads/">Download</a>
    <a href="/blogs/">Blogs</a>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeIcon">☀️</button>
  </div>
</div>

<div class="hero">
  <h1>556</h1>
  <p>Oops! The page you are looking for is under maintenance</p>
  <a href="/" class="button">Back to Home</a>
</div>

<footer>© 2026 Rip_Dead Studios — All Rights Reserved</footer>

<script>
const themeIcon=document.getElementById("themeIcon");

function toggleTheme(){
  document.body.classList.toggle("light");
  themeIcon.textContent =
    document.body.classList.contains("light") ? "🌙" : "☀️";
}
</script>

</body>
</html>
