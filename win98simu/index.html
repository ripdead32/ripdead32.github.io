<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rip_Dead Site - Windows 98 Simulator</title>
    
    <link rel="icon" type="image/png" href="https://win98icons.alexmeub.com/icons/png/windows-0.png" sizes="16x16">
    <link rel="icon" type="image/png" href="https://win98icons.alexmeub.com/icons/png/windows-4.png" sizes="32x32">

    <style>
        @font-face {
            font-family: 'Win98';
            src: url('https://fonts.cdnfonts.com/s/14315/MS-Sans-Serif.woff') format('woff');
        }

        :root {
            --bg-teal: #008080;
            --silver: #c0c0c0;
            --dark-gray: #808080;
            --white: #ffffff;
            --blue-title: #000080;
        }

        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Win98', sans-serif;
            overflow: hidden;
            cursor: url('https://cur.cursors-4u.net/games/gam-4/gam384.cur'), auto;
        }

        /* The Desk Setup Layout */
        #desk-setup {
            display: flex;
            align-items: flex-end;
            gap: 40px;
        }

        /* Physical PC Case (Desktop Unit) */
        #pc-case {
            width: 180px;
            height: 450px;
            background: #e0e0e0;
            border: 4px solid #bebebe;
            border-right: 8px solid #999;
            border-bottom: 8px solid #999;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
        }

        .floppy-drive {
            width: 120px;
            height: 15px;
            background: #333;
            margin-bottom: 20px;
            border: 2px solid #888;
        }

        #power-button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #ccc;
            border: 4px solid #999;
            margin-top: auto;
            margin-bottom: 20px;
            cursor: pointer;
            box-shadow: inset -2px -2px 5px #fff, 2px 2px 5px #000;
        }
        #power-button:active { box-shadow: inset 2px 2px 5px #000; transform: translateY(2px); }

        #power-led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #300;
            margin-bottom: 40px;
        }
        #power-led.on { background: #0f0; box-shadow: 0 0 10px #0f0; }

        /* CRT Monitor */
        #monitor {
            background: #dcdcdc;
            padding: 30px;
            border-radius: 20px;
            border-bottom: 12px solid #a0a0a0;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
        }

        #screen-container {
            width: 800px;
            height: 600px;
            background: #000;
            border: 15px solid #222;
            position: relative;
            overflow: hidden;
        }

        /* Layers */
        .layer { display: none; width: 100%; height: 100%; position: absolute; }
        
        #bios { background: #000; color: #fff; padding: 25px; font-family: monospace; font-size: 16px; }

        #desktop { background: var(--bg-teal); }

        /* Icon Styling Fix */
        .icon {
            width: 70px;
            margin: 15px;
            text-align: center;
            color: white;
            font-size: 11px;
            text-shadow: 1px 1px 1px #000;
            cursor: pointer;
            display: inline-block;
        }
        .icon img { 
            width: 32px; height: 32px; 
            display: block; margin: 0 auto 4px;
            image-rendering: pixelated; 
        }

        /* Window & UI Elements */
        .window {
            position: absolute; top: 40px; left: 80px; width: 350px;
            background: var(--silver); border: 2px solid;
            border-color: var(--white) var(--dark-gray) var(--dark-gray) var(--white);
            z-index: 10;
        }
        .title-bar {
            background: linear-gradient(90deg, var(--blue-title), #1084d0);
            color: white; padding: 3px 6px; font-weight: bold; font-size: 13px;
            display: flex; justify-content: space-between;
        }

        #taskbar {
            position: absolute; bottom: 0; width: 100%; height: 28px;
            background: var(--silver); border-top: 2px solid var(--white);
            display: flex; align-items: center; padding: 2px; box-sizing: border-box;
        }

        .start-btn {
            height: 20px; border: 2px solid; font-weight: bold;
            border-color: var(--white) var(--dark-gray) var(--dark-gray) var(--white);
            display: flex; align-items: center; padding: 0 5px; gap: 4px;
        }

        #monitor-btn {
            width: 20px; height: 10px; background: #444; margin: 15px auto 0;
            border-radius: 2px; cursor: pointer; border: 1px solid #222;
        }
    </style>
</head>
<body>

<div id="desk-setup">
    <div id="pc-case">
        <div class="floppy-drive"></div>
        <div class="floppy-drive" style="width: 100px; height: 10px;"></div>
        <div style="font-size: 10px; color: #888; margin-top: 20px;">RIP_DEAD 98 PRO</div>
        <button id="power-button" onclick="pressPower()"></button>
        <div id="power-led"></div>
    </div>

    <div id="monitor">
        <div id="screen-container">
            <div id="overlay" style="width:100%; height:100%; background:#000; z-index:999; position:absolute;"></div>
            
            <div id="bios" class="layer">
                <p>Award Modular BIOS v4.51PG</p>
                <p>Copyright (C) 1998, Rip_Dead Studios</p>
                <br>
                <p id="ram-text">Memory Test : 0K OK</p>
                <p>Detecting HDD... Done</p>
                <p>Starting Windows...</p>
            </div>

            <div id="desktop" class="layer">
                <div class="icon" ondblclick="toggleWin('my-comp')">
                    <img src="https://win98icons.alexmeub.com/icons/png/computer_pc-4.png">
                    My Computer
                </div>

                <div id="my-comp" class="window" style="display:none">
                    <div class="title-bar" onmousedown="dragStart(event, 'my-comp')">
                        <span>My Computer</span>
                        <button onclick="toggleWin('my-comp')">X</button>
                    </div>
                    <div style="padding:15px; background:white; height:120px; border:1px inset #888;">
                        (C:) System Drive<br>
                        (D:) Data
                    </div>
                </div>

                <div id="taskbar">
                    <div class="start-btn">
                        <img src="https://win98icons.alexmeub.com/icons/png/windows-0.png" width="16">
                        Start
                    </div>
                </div>
            </div>
        </div>
        <div id="monitor-btn" onclick="toggleMonitor()"></div>
    </div>
</div>

<audio id="startup-wav" src="/win98simu/startup.wav"></audio>

<script>
    let pcOn = false;
    let monOn = false;
    const overlay = document.getElementById('overlay');
    const led = document.getElementById('power-led');

    function pressPower() {
        pcOn = !pcOn;
        if (pcOn) {
            led.classList.add('on');
            if (monOn) startBoot();
            else beep(); // Motherboard beep always happens
        } else {
            led.classList.remove('on');
            location.reload();
        }
    }

    function toggleMonitor() {
        monOn = !monOn;
        overlay.style.display = monOn ? 'none' : 'block';
        if (monOn && pcOn) startBoot();
    }

    function beep() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        osc.type = 'square'; osc.frequency.value = 800;
        osc.connect(ctx.destination);
        osc.start(); setTimeout(() => osc.stop(), 150);
    }

    async function startBoot() {
        if (document.getElementById('bios').style.display === 'block') return;
        beep();
        hideAll();
        document.getElementById('bios').style.display = 'block';
        
        let ram = 0;
        const intr = setInterval(() => {
            ram += 4096;
            document.getElementById('ram-text').innerText = `Memory Test : ${ram}K OK`;
            if (ram >= 65536) clearInterval(intr);
        }, 40);

        await new Promise(r => setTimeout(r, 3000));
        hideAll();
        document.getElementById('desktop').style.display = 'block';
        document.getElementById('startup-wav').play().catch(()=>{});
    }

    function hideAll() {
        document.querySelectorAll('.layer').forEach(l => l.style.display = 'none');
    }

    function toggleWin(id) {
        const w = document.getElementById(id);
        w.style.display = w.style.display === 'none' ? 'block' : 'none';
    }

    function dragStart(e, id) {
        const win = document.getElementById(id);
        let sX = e.clientX - win.offsetLeft;
        let sY = e.clientY - win.offsetTop;
        function move(ev) {
            win.style.left = (ev.clientX - sX) + 'px';
            win.style.top = (ev.clientY - sY) + 'px';
        }
        document.addEventListener('mousemove', move);
        document.onmouseup = () => document.removeEventListener('mousemove', move);
    }
</script>

</body>
</html>
